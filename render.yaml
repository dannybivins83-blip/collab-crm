# Render Blueprint — runs the CRM as ONE always-on service with the database (SQLite)
# AND all uploads on a single PERSISTENT DISK. This replaces THREE vendors at once:
#   Vercel (hosting) + Neon (database) + Google Drive (file storage)  ->  just Render.
# Why it ends the cap problems: SQLite is a local file, so DB reads are $0 egress (no
# "transfer quota"), and you deploy by pushing to git (no 100/day deploy cap).
#
# Deploy: Render Dashboard → New → Blueprint → connect this repo (dannybivins83-blip/
#   collab-crm). Render reads this file. One-time data move: run scripts/neon_to_sqlite.py
#   to produce crm.db, then upload it to /data via a Render Shell (or restore a CRM
#   backup). Finally map crm.collaborativeconceptsfl.com under Settings → Custom Domains.
services:
  - type: web
    name: collab-crm
    runtime: python
    rootDir: .
    plan: starter              # starter includes the persistent disk; free tier does NOT
    buildCommand: pip install -r requirements.txt
    # 2 workers + threads share the WAL-mode SQLite file safely (concurrent readers,
    # serialized writers) — what makes single-host SQLite hosting solid at this scale.
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --threads 4 --timeout 180
    healthCheckPath: /login
    autoDeploy: true
    envVars:
      # DATABASE_URL is intentionally OMITTED → db.IS_PG = False → the app runs on the
      # SQLite file below. This is the whole point: no external database, no Neon.
      - key: CRM_DB_PATH        # the SQLite database lives on the persistent disk
        value: /data/crm.db
      - key: CRM_DATA_DIR
        value: /data
      - key: CRM_UPLOAD_DIR     # all uploads/photos/docs/packets also live on the disk
        value: /data/uploads
      - key: CRM_SECRET
        generateValue: true     # random, stable session secret
      - key: CRM_NOBROWSER
        value: "1"
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: TZ
        value: America/New_York
      # Google Drive — set these so EXISTING uploaded files (currently mirrored to Drive)
      # keep serving after cutover. New files write to /data/uploads on the disk. Once you
      # backfill Drive -> /data/uploads you can drop these and be fully Drive-free.
      # Cloudflare R2 — preferred file storage (S3-compatible, $0/mo for 10 GB).
      # Create a bucket at dash.cloudflare.com/r2 and an R2 API token with
      # Object Read & Write on that bucket. Set all four vars to activate.
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET_NAME
        sync: false
      # Google Drive — legacy fallback for files uploaded before R2 was added.
      # Keep set until all existing Drive files are backfilled to R2.
      - key: GDRIVE_SA_JSON       # paste the service-account key JSON (raw or base64)
        sync: false
      - key: GDRIVE_FOLDER_ID
        sync: false
      # Google login + the in-CRM Gmail widget (keep if you use them):
      - key: GOOGLE_OAUTH_CLIENT_ID
        sync: false
      - key: GOOGLE_OAUTH_CLIENT_SECRET
        sync: false
      # Integration shared secrets (measurement-app ingest + SSO bus):
      # NOTE: these now FAIL CLOSED in prod when unset (audit #2) — Render auto-sets
      # RENDER=true so config.IS_PROD is true here; set real values or signed ingest +
      # SSO refuse. (Render needs no CRM_ENV; Vercel does — see the runbook.)
      - key: MEASURE_CRM_WEBHOOK_SECRET
        sync: false
      - key: SEABREEZE_CRM_WEBHOOK_SECRET
        sync: false
      - key: CRM_SYNC_SECRET        # gates the AccuLynx->CRM bookmarklet bridge (audit #1)
        sync: false
      - key: CRON_SECRET            # protects /sync/cron (unattended sync trigger)
        sync: false
      # First-run admin login. The seeded admin user gets THIS password on first boot
      # (modules/auth.py). REQUIRED for a fresh deploy to be loginnable — set it in the
      # Render dashboard, then change it via /account after first login. (turn-over blocker #1)
      - key: CRM_DEFAULT_PASSWORD
        sync: false
      # Brand a fresh deploy. Leave UNSET for a neutral "Your Company" white-label boot with
      # a single admin (CRM_ADMIN_EMAIL). Set CRM_SEED_DEMO=seabreeze to seed the SeaBreeze
      # reference tenant + sample data. (turn-over blocker #2)
      - key: CRM_SEED_DEMO
        sync: false
      - key: CRM_ADMIN_EMAIL        # email for the auto-seeded admin on a neutral deploy
        sync: false
    disk:
      name: crm-data
      mountPath: /data
      sizeGB: 5                  # room for the SQLite DB + full document library + photos
