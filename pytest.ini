[pytest]
# Scope collection to the real test suite in tests/.
# The repo root also contains standalone diagnostic scripts named test_batch14*.py
# that are NOT pytest tests — they run app code at import time and define helper
# functions named test()/test_follow() with positional args pytest misreads as
# fixtures ("fixture 'route' not found"). testpaths keeps `pytest` at the repo
# root clean by only collecting tests/.
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
