{% extends "base.html" %}
{% block title %}New Invoice{% endblock %}
{% block body %}
<div class="page-head"><a class="btn ghost" href="javascript:history.back()">← Back</a><h1>💵 New Invoice</h1></div>
<form method="post" class="card" style="max-width:560px">
  <div class="field"><label>Job</label>
    <select name="job_id"><option value="">— none —</option>
      {% for j in jobs %}<option value="{{ j.id }}" {{ 'selected' if job and job.id==j.id }}>{{ j.name }} ({{ j.contract_value }})</option>{% endfor %}
    </select>
  </div>
  <div class="field"><label>Draw</label>
    <select name="draw_key" id="drawSel" onchange="fillAmt()"><option value="">Custom</option>
      {% for d in draws %}<option value="{{ d.label }}" data-amt="{{ '%.2f'|format(d.amount) if d.amount is not none else '' }}">{{ d.label }}{% if d.amount is not none %} — {{ money(d.amount) }}{% endif %}</option>{% endfor %}
    </select>
    {% if contract_total %}<div class="muted" style="font-size:12px;margin-top:4px">Draws priced from estimate total {{ money(contract_total) }}. Pick a draw to auto-fill the amount.</div>{% endif %}
  </div>
  <div class="row">
    <div class="field"><label>Amount</label><input name="amount" id="amtInp" placeholder="$9,725" required></div>
    <div class="field"><label>Due date</label><input type="date" name="due_date"></div>
  </div>
  <div class="field"><label>Notes</label><textarea name="notes"></textarea></div>
  <button class="primary" type="submit">Create invoice</button>
</form>
<script>
function fillAmt(){
  var s=document.getElementById('drawSel'), a=document.getElementById('amtInp');
  var amt=s.options[s.selectedIndex].getAttribute('data-amt');
  if(amt && !a.value) a.value=amt;
  else if(amt) a.value=amt;
}
</script>
{% endblock %}
