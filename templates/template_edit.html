{% extends "base.html" %}
{% block title %}{{ t.name }}{% endblock %}
{% block body %}
<div class="page-head">
  <a href="{{ url_for('templates.index') }}" class="muted">← Templates</a>
  <h1 style="margin-left:8px">Edit Template</h1>
  <div class="grow"></div>
  <button class="primary" onclick="saveT()">💾 Save</button>
</div>
<div class="card" style="max-width:900px">
  <div class="row">
    <div class="field"><label>Template name</label><input id="name" value="{{ t.name }}"></div>
    <div class="field"><label>Work type</label>
      <select id="work_type">{% for w in work_types %}<option {{ 'selected' if t.work_type==w }}>{{ w }}</option>{% endfor %}</select>
    </div>
  </div>
  <div class="field"><label>Scope of work (prints on the proposal — lettered clauses a., b., c. …)</label>
    <textarea id="scope" style="min-height:160px">{{ t.scope_text or '' }}</textarea></div>

  <label>Line items</label>
  <table class="lines" id="lines">
    <thead><tr><th style="width:46%">Product / Description</th><th class="num">Qty</th><th>Unit</th><th class="num">Cost/Unit</th><th></th></tr></thead>
    <tbody>
      {% for l in t._lines %}
      <tr>
        <td><input class="l-desc" value="{{ l.description }}"></td>
        <td class="num"><input class="l-qty num" type="number" step="0.01" value="{{ l.qty }}" style="width:70px"></td>
        <td><input class="l-unit" value="{{ l.unit }}" style="width:60px"></td>
        <td class="num"><input class="l-cost num" type="number" step="0.01" value="{{ l.cost }}" style="width:90px"></td>
        <td><button class="btn sm" onclick="this.closest('tr').remove()">✕</button></td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
  <button type="button" class="btn sm" onclick="addRow()">+ Line</button>
</div>

<script>
function addRow(){
  const tb=document.querySelector('#lines tbody');const tr=document.createElement('tr');
  tr.innerHTML=`<td><input class="l-desc"></td><td class="num"><input class="l-qty num" type="number" step="0.01" value="0" style="width:70px"></td>`+
    `<td><input class="l-unit" value="EA" style="width:60px"></td><td class="num"><input class="l-cost num" type="number" step="0.01" value="0" style="width:90px"></td>`+
    `<td><button class="btn sm" onclick="this.closest('tr').remove()">✕</button></td>`;
  tb.appendChild(tr);
}
function saveT(){
  const lines=[...document.querySelectorAll('#lines tbody tr')].map(tr=>({
    description:tr.querySelector('.l-desc').value,unit:tr.querySelector('.l-unit').value,
    qty:+tr.querySelector('.l-qty').value||0,cost:+tr.querySelector('.l-cost').value||0})).filter(l=>l.description);
  fetch('{{ url_for("templates.save", tid=t.id) }}',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({name:document.getElementById('name').value,work_type:document.getElementById('work_type').value,
      scope_text:document.getElementById('scope').value,lines})})
    .then(r=>r.json()).then(d=>{if(d.ok){const b=event.target;b.textContent='✓ Saved';setTimeout(()=>b.textContent='💾 Save',1200)}});
}
</script>
{% endblock %}
